# Third-party skills I use frequently.
#
# These are NOT part of this repository or its marketplace — they are authored
# and maintained by other people. This file is a personal reading list: the link
# script (run with --include-external) clones each source repo and symlinks the listed
# skills into ~/.claude/skills alongside my own, so I get them without vendoring
# someone else's work into this repo. Credit and updates stay with the original
# authors. Remove or add lines freely; it only affects my local machine.

# Directory where the source repositories are cloned (~ is expanded).
CLONE_DIR=~/Code/github-azborgonovo

